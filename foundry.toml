[profile.default]
src = "src"
test = "tests"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200
# Ignore compiler warnings:
# 2018: Function state mutability can be restricted to view (some functions must match interface signatures)
# 5574: Contract code size exceeds limit (only affects scripts, not production contracts)
# 3860: Contract initcode size exceeds limit (only affects test contracts, not production)
ignored_error_codes = [2018, 5574, 3860]

# Test profile: more aggressive optimizer settings to reduce contract size
[profile.test]
optimizer = true
optimizer_runs = 100  # Lower runs = smaller bytecode (better for tests)
# Ignore contract size warnings for tests (they don't deploy to mainnet)
ignored_error_codes = [2018, 5574, 3860]

# See more config options https://book.getfoundry.sh/reference/config.html

# Coverage configuration
# Run: forge coverage --exclude-tests --skip script --ir-minimum

[lint]
# Warnings are documented inline with forge-lint: disable-next-line comments
# explaining why each cast/transfer is safe
# All unsafe-typecast warnings are documented (bytes4 casts, int256->uint256 with checks)
# All erc20-unchecked-transfer warnings in tests are documented (ERC20Mock always succeeds)
exclude_lints = ["mixed-case-function", "mixed-case-variable", "unwrapped-modifier-logic"]
# Only show high, med, low severity - ignore info/gas/code-size (note level)
severity = ["high", "med", "low"]
# Ignore lint warnings in test files
ignore = ["tests/**/*.sol"]
